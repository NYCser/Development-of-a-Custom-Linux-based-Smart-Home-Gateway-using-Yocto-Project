<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo tổng quan - SmartHome Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/components.css"> <link rel="stylesheet" href="css/notifications.css"> </head>
<body>

    <header class="admin-header" style="background: #fff; padding: 10px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-home" style="color: var(--primary-color); font-size: 1.5rem;"></i>
            <span style="font-weight: bold; font-size: 1.2rem;">SmartHome Admin</span>
        </div>
        <nav>
            <a href="admin.html" style="text-decoration: none; color: #666; margin-right: 20px; font-weight: 500;">Trang Chủ</a>
            <a href="#" style="text-decoration: none; color: var(--primary-color); font-weight: bold; border-bottom: 2px solid var(--primary-color);">Thông Báo</a>
        </nav>
    </header>

    <main class="notifications-page">
        <div class="container">
            <div class="notifications-header-card">
                <div class="header-top">
                    <h2>THÔNG BÁO TỔNG QUAN</h2>
                    <div class="header-actions">
                        <button id="markAllReadBtn" class="btn btn-primary-soft">Đánh dấu tất cả đã đọc</button>
                        <button class="btn btn-outline"><i class="fas fa-cog"></i> Cài đặt thông báo</button>
                    </div>
                </div>

                <div class="filter-section">
                    <p class="filter-label">BỘ LỌC THÔNG MINH</p>
                    <div class="filter-controls">
                        <div class="filter-group">
                            <select id="filterType" class="form-select">
                                <option value="all">Lọc theo Loại</option>
                                <option value="login">Đăng nhập</option>
                                <option value="access">Ra vào cửa</option>
                                <option value="automation">Tự động hóa</option>
                                <option value="alert">Cảnh báo nguy hiểm</option>
                            </select>

                            <select id="filterStatus" class="form-select">
                                <option value="all">Lọc theo Trạng thái</option>
                                <option value="unread">Chưa đọc</option>
                                <option value="read">Đã đọc</option>
                            </select>

                            <button id="clearFilter" class="btn btn-link" style="background: none; border: none; color: #4e73df; cursor: pointer; font-size: 0.9rem;">Xóa bộ lọc</button>
                        </div>

                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Tìm kiếm thông báo...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="notifications-list-container">
                <div id="fullNotifyList" class="full-notify-list">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu từ hệ thống...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="notifications.js"></script>
</body>
</html>
