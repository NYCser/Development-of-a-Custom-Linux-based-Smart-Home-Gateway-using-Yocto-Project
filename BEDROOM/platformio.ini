; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

lib_deps =
    ; ============================================================
    ; 1. CORE & NETWORK (Dùng chung cho cả 3 phòng)
    ; ============================================================
    knolleary/PubSubClient @ ^2.8           ; Giao tiếp MQTT
    bblanchon/ArduinoJson @ ^6.21.3         ; Đóng gói & giải mã JSON

    ; ============================================================
    ; 2. SENSORS CƠ BẢN (Living Room, Kitchen)
    ; ============================================================
    adafruit/DHT sensor library @ ^1.4.4    ; Cảm biến nhiệt/ẩm DHT11/DHT22
    adafruit/Adafruit Unified Sensor @ ^1.1.9 ; Thư viện nền tảng cho DHT

    ; ============================================================
    ; 3. HIỂN THỊ (Living Room, Kitchen)
    ; ============================================================
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.2 ; Màn hình LCD 1602/2004 qua I2C

    ; ============================================================
    ; 4. BẢO MẬT & CỬA (Living Room/Entrance)
    ; ============================================================
    miguelbalboa/MFRC522 @ ^1.4.10          ; Đầu đọc thẻ từ RFID RC522
    adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.0 ; Cảm biến vân tay quang học

    ; ============================================================
    ; 5. ĐIỆN NĂNG (Kitchen Specific)
    ; ============================================================
    adafruit/Adafruit INA219 @ ^1.2.3       ; Cảm biến dòng/áp/công suất INA219

    ; ============================================================
    ; 6. MÔI TRƯỜNG CAO CẤP (Bedroom Specific - CJMCU-8118)
    ; ============================================================
    adafruit/Adafruit CCS811 Library @ ^1.1.1 ; Cảm biến không khí (CO2, TVOC)
    closedcube/ClosedCube HDC1080 @ ^1.3.2 ; Cảm biến nhiệt/ẩm độ chính xác cao